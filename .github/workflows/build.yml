name: Source Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump Version
        id: bump_version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "previous_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          if [ -z "$LATEST_TAG" ]; then
            NEW_TAG="v1.0.0"
          else
            CLEAN_TAG="${LATEST_TAG#v}"
            IFS='.' read -r -a parts <<< "$CLEAN_TAG"
            MAJOR="${parts[0]:-1}"
            MINOR="${parts[1]:-0}"
            PATCH="${parts[2]:-0}"
            PATCH=$((PATCH + 1))
            NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Generate Release Notes from Commits
        id: release_notes
        run: |
          LATEST_TAG="${{ steps.bump_version.outputs.previous_tag }}"
          NOTES=""
          if [ -z "$LATEST_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${LATEST_TAG}..HEAD"
          fi
          git log $RANGE --pretty=format:'COMMIT_START%n%s%n%h%n%H%n%an%n%b%nCOMMIT_END' | \
          awk -v repo="${{ github.repository }}" '
            /^COMMIT_START$/ { s=""; h=""; H=""; a=""; b=""; next }
            /^COMMIT_END$/ {
              printf "- **%s** ([`%s`](https://github.com/%s/commit/%s)) - @%s\n", s, h, repo, H, a
              if (b != "") {
                n = split(b, lines, "\n")
                for (i = 1; i <= n; i++) {
                  if (lines[i] != "") printf "  %s\n", lines[i]
                }
              }
              next
            }
            s=="" { s=$0; next }
            h=="" { h=$0; next }
            H=="" { H=$0; next }
            a=="" { a=$0; next }
            { b = (b=="" ? $0 : b "\n" $0) }
          ' > /tmp/notes.txt
          NOTES=$(cat /tmp/notes.txt)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump_version.outputs.new_tag }}
          name: Release ${{ steps.bump_version.outputs.new_tag }}
          body: |
            ![Hexllama Logo](https://github.com/${{ github.repository }}/raw/main/assets/github-logo-hexllama.png)

            ### What's Changed:
            ${{ steps.release_notes.outputs.notes }}

            ---
            **Full Changelog**: https://github.com/${{ github.repository }}/compare/${{ steps.bump_version.outputs.previous_tag }}...${{ steps.bump_version.outputs.new_tag }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
