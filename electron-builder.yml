appId: com.hexllama.app
productName: Hexllama
directories:
  buildResources: build
files:
  - out/main/**/*
  - out/preload/**/*
  - out/renderer/**/*
extraResources:
  - from: resources
    to: resources
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64
  icon: assets/icon_256.png
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
mac:
  target: dmg
  icon: assets/icon_1024.png
linux:
  target: AppImage
  icon: assets/icon_256.png
